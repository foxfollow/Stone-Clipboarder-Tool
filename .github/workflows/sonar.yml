name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonar:
    name: Analyze with SonarCloud
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)
          if [[ -n "$LATEST_XCODE" ]]; then
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          fi
          xcodebuild -version

      - name: Run tests with coverage
        run: |
          xcodebuild test \
            -project StoneClipboarderTool.xcodeproj \
            -scheme StoneClipboarderTool \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/TestResults.xcresult \
            -destination "platform=macOS" \
            -enableCodeCoverage YES \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Convert coverage to Sonar generic format
        run: |
          curl -fsSL https://raw.githubusercontent.com/SonarSource/sonar-scanning-examples/master/swift-coverage/swift-coverage-example/xccov-to-sonarqube-generic.sh \
            -o xccov-to-sonarqube-generic.sh
          chmod +x xccov-to-sonarqube-generic.sh
          ./xccov-to-sonarqube-generic.sh build/TestResults.xcresult > sonar-coverage.xml
          echo "Coverage report size: $(wc -l < sonar-coverage.xml) lines"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.organization=foxfollow
            -Dsonar.projectKey=foxfollow_Stone-Clipboarder-Tool
            -Dsonar.sources=StoneClipboarderTool
            -Dsonar.tests=StoneClipboarderToolTests
            -Dsonar.exclusions=build/**,docs/**
            -Dsonar.coverage.exclusions=StoneClipboarderTool/View/**,StoneClipboarderTool/Manager/**,StoneClipboarderTool/StoneClipboarderToolApp.swift,StoneClipboarderTool/Assets.xcassets/**,StoneClipboarderTool/Helper/**
            -Dsonar.coverageReportPaths=sonar-coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
